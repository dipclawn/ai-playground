<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="🤖 AI Playground - 多模型AI工具箱。支持聊天、图片生成、模型浏览，基于SiliconFlow API。纯前端，保护隐私。">
<meta name="keywords" content="AI,人工智能,大模型,聊天,SiliconFlow,免费AI工具">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Playground">
<title>🤖 AI Playground - 多模型AI工具箱</title>
<link rel="icon" href="web/icon-192.png">
<link rel="apple-touch-icon" href="web/icon-192.png">
<link rel="manifest" href="web/manifest.json">
<!-- Semi Design -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@douyinfe/semi-ui@2.71.0/dist/css/semi.min.css">
<style>
:root{--semi-color-primary:#6366f1;--semi-color-primary-hover:#818cf8;--semi-color-primary-active:#4f46e5;--semi-color-primary-light-default:rgba(99,102,241,0.08);--semi-color-primary-light-hover:rgba(99,102,241,0.12);--semi-color-primary-light-active:rgba(99,102,241,0.2)}
body{background:var(--semi-color-bg-0);max-width:800px;margin:0 auto;padding-bottom:70px;min-height:100vh}
.app-header{background:var(--semi-color-primary);color:#fff;padding:48px 24px 14px;position:sticky;top:0;z-index:100;backdrop-filter:blur(12px)}
.app-header h1{font-size:20px;font-weight:600;margin:0;display:flex;align-items:center;gap:8px}
.app-header .sub{font-size:12px;opacity:.7;margin-top:2px}

/* 聊天区域 */
.chat-wrap{flex:1;display:flex;flex-direction:column;height:calc(100vh - 200px);min-height:400px}
.chat-box{flex:1;overflow-y:auto;padding:16px;scroll-behavior:smooth}
.msg{display:flex;gap:10px;margin:12px 0;animation:fadeIn .25s}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .avatar{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.msg .avatar.ai{background:var(--semi-color-primary-light-active)}
.msg .avatar.user{background:rgba(14,165,233,0.15)}
.msg .bubble{max-width:78%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.7;overflow-wrap:break-word;white-space:pre-wrap}
.msg.user .bubble{background:var(--semi-color-primary);color:#fff;border-radius:14px 4px 14px 14px}
.msg.ai .bubble{background:var(--semi-color-bg-1);border:1px solid var(--semi-color-border);border-radius:4px 14px 14px 14px}
.msg .bubble .model-tag{font-size:10px;color:var(--semi-color-text-2);margin-bottom:4px}
.msg .bubble pre{background:var(--semi-color-bg-0);padding:10px;border-radius:8px;overflow-x:auto;font-size:12px;margin:6px 0}
.msg .bubble code{background:var(--semi-color-bg-0);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--semi-color-danger)}
.msg .bubble blockquote{border-left:3px solid var(--semi-color-primary);padding:4px 10px;margin:6px 0;background:var(--semi-color-bg-0);border-radius:4px;color:var(--semi-color-text-2)}
.msg .bubble table{border-collapse:collapse;margin:6px 0;font-size:12px;width:100%}
.msg .bubble th,.msg .bubble td{border:1px solid var(--semi-color-border);padding:4px 8px;text-align:left}
.msg .bubble th{background:var(--semi-color-bg-0)}
.msg .bubble h1,.msg .bubble h2,.msg .bubble h3{font-size:15px;margin:8px 0 4px}
.msg .bubble ul,.msg .bubble ol{padding-left:18px;margin:4px 0}

.input-bar{display:flex;gap:8px;padding:12px 16px;background:var(--semi-color-bg-1);border-top:1px solid var(--semi-color-border);align-items:flex-end}
.input-bar .semi-textarea-wrapper{border-radius:10px;flex:1}
.input-bar .semi-textarea{font-size:14px}

/* 功能区域 */
.tab-content{padding:16px}
.feature-card{background:var(--semi-color-bg-1);border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid var(--semi-color-border)}
.feature-card h3{font-size:15px;font-weight:600;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.feature-card .desc{font-size:12px;color:var(--semi-color-text-2);margin-bottom:14px}
.model-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px}
.model-grid .semi-tag{cursor:pointer;font-size:12px;padding:4px 10px}
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-top:12px}
.img-grid .img-item{position:relative;border-radius:10px;overflow:hidden;background:var(--semi-color-bg-0)}
.img-grid .img-item img{width:100%;display:block}
.img-grid .img-item .img-label{font-size:11px;color:var(--semi-color-text-2);padding:4px;text-align:center}
.img-grid .img-item .dl-btn{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:11px}

/* 设置抽屉 */
.settings-section{margin-bottom:20px}
.settings-section label{font-size:13px;font-weight:500;display:block;margin-bottom:6px;color:var(--semi-color-text-0)}
.settings-section .hint{font-size:11px;color:var(--semi-color-text-2);margin-top:4px;line-height:1.5}

/* 空状态 */
.empty-state{text-align:center;padding:40px 20px;color:var(--semi-color-text-2)}
.empty-state .emoji{font-size:48px;margin-bottom:8px}

/* 流式光标 */
.cursor-blink{display:inline-block;width:8px;height:16px;background:var(--semi-color-primary);animation:blink .8s step-end infinite;vertical-align:middle;margin-left:2px;border-radius:2px}
@keyframes blink{50%{opacity:0}}

/* 对话列表侧栏 */
.history-sidebar{background:var(--semi-color-bg-1);border-right:1px solid var(--semi-color-border);padding:12px;width:220px;flex-shrink:0;overflow-y:auto;display:none}
.history-sidebar.show{display:block}
.history-item{padding:8px 10px;border-radius:8px;cursor:pointer;font-size:12px;margin:2px 0;transition:.15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.history-item:hover{background:var(--semi-color-fill-0)}
.history-item.active{background:var(--semi-color-primary-light-default);color:var(--semi-color-primary)}

@media(prefers-color-scheme:light){
  .app-header{color:#fff}
}
@media(max-width:640px){
  .history-sidebar{display:none!important}
  .msg .bubble{max-width:90%}
}

/* Toast自定义 */
.toast-custom{padding:8px 16px;border-radius:10px;font-size:13px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--semi-color-border);border-top-color:var(--semi-color-primary);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="app-header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h1>🤖 AI Playground</h1>
    <div style="display:flex;gap:6px">
      <!-- 设置按钮用Semi原生的Button在JS里渲染 -->
    </div>
  </div>
  <div class="sub">多模型对话 · 图片生成 · 基于 SiliconFlow</div>
</div>

<!-- Sidebar + Main Layout -->
<div id="app-root">
  <div style="display:flex;min-height:calc(100vh - 90px)">
    <!-- 对话历史侧栏 -->
    <div class="history-sidebar" id="sidebar">
      <div style="font-size:12px;font-weight:600;color:var(--semi-color-text-1);padding:4px 8px 8px;display:flex;justify-content:space-between;align-items:center">
        <span>💬 历史对话</span>
        <button id="newChatBtn" style="background:none;border:none;cursor:pointer;font-size:16px;padding:2px;color:var(--semi-color-primary)">+</button>
      </div>
      <div id="historyList"></div>
    </div>
    
    <!-- 内容区域 -->
    <div style="flex:1;display:flex;flex-direction:column">
      <!-- 顶部导航 Tab -->
      <div id="tabBar" style="background:var(--semi-color-bg-1);border-bottom:1px solid var(--semi-color-border)"></div>
      
      <!-- Tab内容 -->
      <div id="tabContent" style="flex:1;display:flex;flex-direction:column"></div>
    </div>
  </div>
</div>

<!-- 设置抽屉（用Semi的Modal渲染） -->
<div id="settings-modal"></div>

<!-- Semi + 脚本 -->
<script src="https://cdn.jsdelivr.net/npm/@douyinfe/semi-ui@2.71.0/dist/umd/semi-ui.min.js"></script>
<script>
// ====== 配置 ======
var API_BASE = 'https://api.siliconflow.cn/v1';
var DEFAULT_MODEL = 'deepseek-ai/DeepSeek-V4-Flash';
var STORAGE_KEY = 'ai_playground_v2';

// ====== 状态 ======
var state = {
  apiKey: localStorage.getItem('ai_api_key') || '',
  chatModel: localStorage.getItem('ai_chat_model') || DEFAULT_MODEL,
  conversations: JSON.parse(localStorage.getItem('ai_conversations') || '[]'),
  currentConv: null, // {id, model, messages, title}
  isGenerating: false,
  tab: 'chat',
  allModels: [],
  imgModel: 'Qwen/Qwen-Image',
  imgSize: '1024x1024'
};

// ====== Semi组件引用 ======
var S = window.SemiUI;
var React = S.React;
var ReactDOM = S.ReactDOM;

// ====== 工具函数 ======
function saveState(){
  localStorage.setItem('ai_api_key', state.apiKey);
  localStorage.setItem('ai_chat_model', state.chatModel);
  localStorage.setItem('ai_conversations', JSON.stringify(state.conversations));
}
function ID(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function toast(msg,type){
  S.Toast[type||'info']({content:msg,duration:2000});
}
function escHTML(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function renderMD(s){
  s=escHTML(s);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/### ([^\n]+)/g,'<h3>$1</h3>');
  s=s.replace(/## ([^\n]+)/g,'<h2>$1</h2>');
  s=s.replace(/# ([^\n]+)/g,'<h1>$1</h1>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/\n- ([^\n]+)/g,'\n<li>$1</li>');
  s=s.replace(/\n\d+\. ([^\n]+)/g,'\n<li>$1</li>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

// ====== API 调用 ======
async function apiCall(path, body){
  var r=await fetch(API_BASE+path,{
    method:'POST',
    headers:{'Authorization':'Bearer '+state.apiKey,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){var t=await r.text();try{var j=JSON.parse(t);throw new Error(j.message||j.error||t)}catch(e){throw e}}
  return r;
}

// ====== 对话管理 ======
function getOrCreateConv(){
  if(state.currentConv) return state.currentConv;
  var conv={id:ID(),model:state.chatModel,messages:[],title:'新对话',createdAt:Date.now()};
  state.currentConv=conv;
  state.conversations.unshift(conv);
  saveState();
  return conv;
}

function addMessage(role,content,model){
  var conv=getOrCreateConv();
  conv.messages.push({role,content,model,timestamp:Date.now()});
  if(conv.title==='新对话' && role==='user'){
    conv.title=content.slice(0,30)+(content.length>30?'...':'');
  }
  saveState();
  renderChat();
}

function newConversation(){
  state.currentConv=null;
  renderChat();
  renderSidebar();
}

function switchConversation(id){
  var conv=state.conversations.find(c=>c.id===id);
  if(!conv)return;
  state.currentConv=conv;
  state.chatModel=conv.model;
  renderChat();
  renderSidebar();
}

function deleteConversation(id,e){
  e.stopPropagation();
  state.conversations=state.conversations.filter(c=>c.id!==id);
  if(state.currentConv&&state.currentConv.id===id){
    state.currentConv=state.conversations[0]||null;
  }
  saveState();
  renderSidebar();
  renderChat();
}

// ====== 聊天 ======
async function sendChat(){
  if(state.isGenerating)return;
  if(!state.apiKey){toast('请先点击右上角⚙️配置 API Key','warning');return}
  
  var input=document.getElementById('chatInput');
  if(!input)return;
  var text=input.value.trim();
  if(!text)return;
  
  input.value='';
  state.isGenerating=true;
  addMessage('user',text);
  
  var conv=getOrCreateConv();
  var msgs=conv.messages.map(m=>({role:m.role,content:m.content}));
  
  try{
    var r=await apiCall('/chat/completions',{
      model:state.chatModel, messages:msgs, stream:true, max_tokens:4096, temperature:0.7
    });
    
    var reader=r.body.getReader();
    var decoder=new TextDecoder();
    var full='';
    
    // 占位消息
    conv.messages.push({role:'assistant',content:'',model:state.chatModel,timestamp:Date.now()});
    renderChat(true);
    var chatBox=document.querySelector('.chat-box');
    var lastMsg=chatBox.lastElementChild;
    
    while(true){
      var {done,value}=await reader.read();
      if(done)break;
      var chunk=decoder.decode(value,{stream:true});
      var lines=chunk.split('\n').filter(l=>l.startsWith('data:')&&!l.includes('[DONE]'));
      for(var line of lines){
        try{
          var d=JSON.parse(line.slice(5));
          var delta=d.choices[0].delta.content||'';
          full+=delta;
          conv.messages[conv.messages.length-1].content=full;
          var bubble=lastMsg.querySelector('.bubble');
          if(bubble){
            bubble.innerHTML=renderMD(full)+'<span class="cursor-blink"></span>';
            chatBox.scrollTop=chatBox.scrollHeight;
          }
        }catch(e){}
      }
    }
    // 移除光标
    var bubble=lastMsg.querySelector('.bubble');
    if(bubble)bubble.innerHTML=renderMD(full);
    saveState();
  }catch(e){
    toast('❌ '+e.message,'error');
    conv.messages.pop();
    state.isGenerating=false;
    renderChat();
    return;
  }
  state.isGenerating=false;
}

// ====== 图片生成 ======
async function generateImage(){
  if(!state.apiKey){toast('请先配置 API Key','warning');return}
  var prompt=document.getElementById('imgPrompt');if(!prompt)return;
  var text=prompt.value.trim();if(!text){toast('请输入图片描述','warning');return}
  
  prompt.disabled=true;
  document.getElementById('imgBtn').textContent='⏳ 生成中...';
  var resultEl=document.getElementById('imgResult');
  resultEl.innerHTML='<div style="text-align:center;padding:20px;color:var(--semi-color-text-2)"><div class="spinner"></div> 正在生成...</div>';
  
  try{
    var r=await apiCall('/images/generations',{
      model:state.imgModel, prompt:text, image_size:state.imgSize, batch_size:2
    });
    var d=await r.json();
    var imgs=d.data||[];
    var h='<div class="img-grid">';
    for(var i=0;i<imgs.length;i++){
      h+='<div class="img-item"><img src="'+imgs[i].url+'" loading=lazy><div class="img-label">图片'+(i+1)+'</div><button class="dl-btn" onclick="downloadImg(\''+imgs[i].url+'\',\'ai_'+Date.now()+'_'+i+'.png\')">⬇</button></div>';
      // 不使用代理，直接使用SiliconFlow返回的图片URL
    }
    h+='</div>';
    resultEl.innerHTML=h;
    toast('✅ 生成完成','success');
  }catch(e){
    resultEl.innerHTML='<div style="text-align:center;padding:20px;color:var(--semi-color-danger)">❌ '+e.message+'</div>';
  }
  prompt.disabled=false;
  document.getElementById('imgBtn').textContent='🎨 生成图片';
}
function downloadImg(url,name){
  var a=document.createElement('a');a.href=url;a.download=name;a.click();
}

// ====== 模型加载 ======
async function loadModels(){
  if(state.allModels.length>0){renderModels();return}
  try{
    var r=await fetch('https://api.siliconflow.cn/v1/models',{headers:{'Authorization':'Bearer '+state.apiKey}});
    if(!r.ok)throw new Error('API 请求失败');
    var d=await r.json();
    state.allModels=d.data||[];
    renderModels();
  }catch(e){document.getElementById('modelList').innerHTML='<div style="text-align:center;padding:20px;color:var(--semi-color-text-2)">加载失败，请检查 API Key</div>'}
}
function renderModels(){
  var list=document.getElementById('modelList');
  if(!list)return;
  state.allModels.sort((a,b)=>a.id.localeCompare(b.id));
  list.innerHTML='<div class="model-grid">'+
    state.allModels.map(m=>'<span class="semi-tag" style="cursor:pointer;margin:2px;'+
      (m.id===state.chatModel?'background:var(--semi-color-primary);color:#fff':'')+
      '" onclick="selectModel(\''+m.id.replace(/'/g,"\\'")+'\')">'+
      m.id+'</span>').join('')+
  '</div>';
}
function selectModel(id){
  state.chatModel=id;
  localStorage.setItem('ai_chat_model',id);
  renderModels();
  toast('✅ 已切换到: '+id.split('/').pop());
}

// ====== 渲染函数 ======
function renderTabBar(){
  var bar=document.getElementById('tabBar');
  if(!bar)return;
  var tabs=[
    {tab:'chat',icon:'💬',label:'对话'},
    {tab:'image',icon:'🎨',label:'图片生成'},
    {tab:'models',icon:'💭',label:'模型'}
  ];
  bar.innerHTML='<div style="display:flex;padding:0 4px">'+
    tabs.map(t=>'<div class="semi-tab" style="padding:10px 16px;cursor:pointer;font-size:13px;font-weight:500;border-bottom:2px solid '+
      (state.tab===t.tab?'var(--semi-color-primary)':'transparent')+
      ';color:'+(state.tab===t.tab?'var(--semi-color-primary)':'var(--semi-color-text-1)')+
      '" onclick="switchTab(\''+t.tab+'\')">'+t.icon+' '+t.label+'</div>'
    ).join('')+
    // 设置按钮放右侧
    '<div style="margin-left:auto;padding:6px 4px"><button class="semi-button semi-button-secondary" style="font-size:12px;padding:4px 12px" onclick="openSettings()">⚙️ 设置</button></div>'+
  '</div>';
}

function switchTab(tab){
  state.tab=tab;
  renderTabBar();
  renderContent();
}

function renderContent(){
  var container=document.getElementById('tabContent');
  if(!container)return;
  
  if(state.tab==='chat'){
    renderChatContent(container);
  }else if(state.tab==='image'){
    renderImageContent(container);
  }else if(state.tab==='models'){
    renderModelsContent(container);
    setTimeout(loadModels,100);
  }
}

function renderChatContent(container){
  var conv=state.currentConv;
  var messagesHtml='';
  
  if(conv&&conv.messages.length>0){
    for(var m of conv.messages){
      var role=m.role==='user'?'user':'ai';
      messagesHtml+='<div class="msg '+role+'">'+
        '<div class="avatar '+(role==='user'?'user':'ai')+'">'+(role==='user'?'👤':'🤖')+'</div>'+
        '<div class="bubble">'+
          (m.model?'<div class="model-tag">'+m.model.split('/').pop()+'</div>':'')+
          (role==='ai'?renderMD(m.content||''):escHTML(m.content).replace(/\n/g,'<br>'))+
        '</div></div>';
    }
  }else{
    messagesHtml='<div class="empty-state"><div class="emoji">🤖</div><p style="font-size:15px;margin-bottom:4px">开始对话</p><p style="font-size:12px">选择模型，输入消息即可</p><p style="font-size:11px;margin-top:6px;color:var(--semi-color-text-3)">当前模型: '+state.chatModel.split('/').pop()+'</p></div>';
  }
  
  container.innerHTML='<div class="chat-wrap"><div class="chat-box" id="chatBox">'+messagesHtml+'</div>'+
    '<div class="input-bar">'+
      '<textarea id="chatInput" class="semi-input semi-input-default" rows="1" style="flex:1;resize:none;padding:10px 14px;border-radius:10px;border:1px solid var(--semi-color-border);background:var(--semi-color-bg-0);font-size:14px;line-height:1.4;outline:none" placeholder="输入消息，Enter发送，Shift+Enter换行" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>'+
      '<button class="semi-button semi-button-primary" id="sendBtn" onclick="sendChat()" style="height:40px;width:40px;padding:0;border-radius:10px;font-size:18px;flex-shrink:0">➤</button>'+
    '</div></div>';
  
  var box=document.getElementById('chatBox');
  if(box)box.scrollTop=box.scrollHeight;
}

function renderImageContent(container){
  container.innerHTML='<div style="padding:16px">'+
    '<div class="feature-card">'+
      '<h3>🎨 AI 图片生成</h3><div class="desc">输入描述文字，AI为你生成图片</div>'+
      '<div style="margin-bottom:10px"><label style="font-size:12px;color:var(--semi-color-text-2);display:block;margin-bottom:4px">选择模型</label>'+
        '<div style="display:flex;gap:6px">'+
          '<span class="semi-tag" style="cursor:pointer;'+(state.imgModel==='Qwen/Qwen-Image'?'background:var(--semi-color-primary);color:#fff':'')+'" onclick="state.imgModel=\'Qwen/Qwen-Image\';renderImageContent(document.getElementById(\'tabContent\'))">Qwen-Image</span>'+
          '<span class="semi-tag" style="cursor:pointer;'+(state.imgModel==='Tongyi-MAI/Z-Image-Turbo'?'background:var(--semi-color-primary);color:#fff':'')+'" onclick="state.imgModel=\'Tongyi-MAI/Z-Image-Turbo\';renderImageContent(document.getElementById(\'tabContent\'))">Z-Image-Turbo</span>'+
        '</div></div>'+
      '<div style="margin-bottom:10px"><label style="font-size:12px;color:var(--semi-color-text-2);display:block;margin-bottom:4px">图片尺寸</label>'+
        '<div style="display:flex;gap:6px">'+
          ['1024x1024','1024x768','768x1024'].map(s=>'<span class="semi-tag" style="cursor:pointer;'+(state.imgSize===s?'background:var(--semi-color-primary);color:#fff':'')+'" onclick="state.imgSize=\''+s+'\';renderImageContent(document.getElementById(\'tabContent\'))">'+s.replace('x','×')+'</span>').join('')+
        '</div></div>'+
      '<input id="imgPrompt" class="semi-input semi-input-default" placeholder="描述你想生成的图片..." style="width:100%;margin-bottom:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--semi-color-border)">'+
      '<button id="imgBtn" class="semi-button semi-button-primary" onclick="generateImage()" style="width:100%;padding:10px;border-radius:8px">🎨 生成图片</button>'+
      '<div id="imgResult" style="margin-top:12px"></div>'+
    '</div></div>';
}

function renderModelsContent(container){
  container.innerHTML='<div style="padding:16px">'+
    '<div class="feature-card">'+
      '<h3>💭 可用模型</h3><div class="desc">点击选择对话使用的模型</div>'+
      '<div id="modelList"><div style="text-align:center;padding:20px;color:var(--semi-color-text-2)"><div class="spinner"></div> 加载中...</div></div>'+
    '</div></div>';
}

function renderChat(){
  var container=document.getElementById('tabContent');
  if(container)renderChatContent(container);
  renderSidebar();
}

function renderSidebar(){
  var list=document.getElementById('historyList');
  if(!list)return;
  list.innerHTML=state.conversations.length===0?
    '<div style="font-size:11px;color:var(--semi-color-text-3);padding:8px;text-align:center">暂无对话</div>':
    state.conversations.map(c=>'<div class="history-item'+(state.currentConv&&state.currentConv.id===c.id?' active':'')+'" onclick="switchConversation(\''+c.id+'\')">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">💬 '+c.title+'</span>'+
        '<span onclick="deleteConversation(\''+c.id+'\',event)" style="flex-shrink:0;font-size:12px;padding:0 4px;cursor:pointer;color:var(--semi-color-text-3)">×</span>'+
      '</div></div>'
    ).join('');
}

// ====== 设置 ======
function openSettings(){
  var modalRoot = document.getElementById('settings-modal');
  var container = S.Modal.useModal();
  
  // 使用Modal展示设置
  S.Modal.info({
    title: '⚙️ 设置',
    width: 480,
    content: React.createElement('div', null,
      React.createElement('div', {className:'settings-section'},
        React.createElement('label', null, 'SiliconFlow API Key'),
        React.createElement('div', {style:{display:'flex',gap:'8px',alignItems:'center'}},
          React.createElement('input', {
            id:'settingsKey',
            className:'semi-input semi-input-default',
            type:'password',
            defaultValue: state.apiKey,
            placeholder:'输入你的 API Key',
            style:{flex:1,padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--semi-color-border)'}
          })
        ),
        React.createElement('div', {className:'hint'}, state.apiKey?'✅ 已配置':'⚠️ 需要 Key，访问 platform.siliconflow.cn 注册获取')
      ),
      React.createElement('div', {className:'settings-section'},
        React.createElement('label', null, '聊天模型'),
        React.createElement('input', {
          id:'settingsModel',
          className:'semi-input semi-input-default',
          defaultValue: state.chatModel,
          style:{width:'100%',padding:'8px 12px',borderRadius:'8px',border:'1px solid var(--semi-color-border)'}
        }),
        React.createElement('div', {className:'hint'}, '输入模型 ID，如 deepseek-ai/DeepSeek-V4-Flash')
      ),
      React.createElement('div', {className:'settings-section'},
        React.createElement('label', null, '对话历史'),
        React.createElement('div', {style:{display:'flex',gap:'8px'}},
          React.createElement('button', {
            className:'semi-button semi-button-danger',
            onClick: function(){
              state.conversations=[];
              state.currentConv=null;
              saveState();
              renderChat();
              renderSidebar();
              S.Modal.destroyAll();
              toast('已清空所有对话','success');
            },
            style:{flex:1,padding:'8px',borderRadius:'8px',cursor:'pointer',fontSize:'13px'}
          }, '🗑️ 清空所有对话')
        )
      )
    ),
    onOk: function(){
      var key=document.getElementById('settingsKey');
      var model=document.getElementById('settingsModel');
      if(key&&key.value.trim()){state.apiKey=key.value.trim();localStorage.setItem('ai_api_key',state.apiKey)}
      if(model&&model.value.trim()){state.chatModel=model.value.trim();localStorage.setItem('ai_chat_model',state.chatModel)}
      toast('✅ 已保存','success');
    },
    okText: '保存',
    cancelText: '取消'
  });
}

// ====== 初始化 ======
function init(){
  renderTabBar();
  
  // 自动恢复上次对话
  if(state.conversations.length>0){
    state.currentConv=state.conversations[0];
  }
  
  renderContent();
  renderSidebar();
  
  // 如果没有Key，提示
  if(!state.apiKey){
    setTimeout(function(){toast('⚙️ 请先点击右上角设置，配置 API Key','warning')},800);
  }
  
  // 注册Service Worker
  if('serviceWorker'in navigator)navigator.serviceWorker.register('web/sw.js').catch(function(){});
}

// 启动
init();
</script>
</body>
</html>

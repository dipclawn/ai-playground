<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="🤖 AI Playground - 免费在线AI工具箱。多模型对话、图片生成、语音识别，基于SiliconFlow API。">
<meta name="keywords" content="AI,人工智能,大模型,聊天,图片生成,SiliconFlow,免费AI工具">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Playground">
<title>🤖 AI Playground</title>
<link rel="icon" href="web/icon-192.png">
<link rel="apple-touch-icon" href="web/icon-192.png">
<link rel="manifest" href="web/manifest.json">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0;max-width:560px;margin:0 auto;padding-bottom:60px;min-height:100vh}
.hdr{background:#6366f1;color:#fff;padding:44px 16px 10px;font-size:17px;font-weight:700;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:20;min-height:64px}
.hdr small{font-size:10px;opacity:.7;font-weight:400}
.hdr .st{font-size:10px;background:rgba(255,255,255,.15);padding:2px 8px;border-radius:10px}

.tb{display:flex;background:#1e293b;margin:0;border-bottom:1px solid #334155}
.tb>div{flex:1;text-align:center;padding:10px 4px;cursor:pointer;font-size:12px;font-weight:600;color:#64748b;border-bottom:2px solid transparent;transition:.2s}
.tb>div.on{color:#818cf8;border-bottom-color:#818cf8}

.pg{display:none}.pg.on{display:block}

.ct{padding:0 10px}

/* 聊天 */
#chatBox{height:calc(100vh - 200px);overflow-y:auto;padding:8px 0}
.msg{display:flex;gap:8px;margin:8px 0;animation:in .3s}
.msg.u{flex-direction:row-reverse}
@keyframes in{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg .av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg .av.a{background:#6366f1}
.msg .av.u{background:#0ea5e9}
.msg .b{max-width:80%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.6;overflow-wrap:break-word;white-space:pre-wrap}
.msg.u .b{background:#6366f1;color:#fff;border-radius:16px 4px 16px 16px}
.msg.a .b{background:#1e293b;border:1px solid #334155;border-radius:4px 16px 16px 16px}
.msg .b pre{background:#0f172a;padding:8px;border-radius:8px;overflow-x:auto;font-size:12px;margin:4px 0}
.msg .b code{background:#334155;padding:1px 4px;border-radius:4px;font-size:12px}
.msg .b .tn{font-size:10px;color:#64748b;margin-bottom:4px}

.iBar{display:flex;gap:6px;padding:8px 10px;background:#1e293b;border-top:1px solid #334155;align-items:flex-end}
.iBar textarea{flex:1;padding:10px 12px;border:1.5px solid #334155;border-radius:12px;background:#0f172a;color:#e2e8f0;font-size:14px;outline:none;resize:none;min-height:40px;max-height:120px;line-height:1.4}
.iBar textarea:focus{border-color:#6366f1}
.iBar button{width:40px;height:40px;border-radius:12px;border:none;background:#6366f1;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.iBar button:disabled{background:#334155;cursor:not-allowed}

/* 模型选择 */
.cd{background:#1e293b;border-radius:12px;padding:14px;margin:8px 0;box-shadow:0 1px 4px rgba(0,0,0,.2)}
h2{font-size:14px;margin-bottom:6px;color:#818cf8;display:flex;align-items:center;gap:4px}
p.h{font-size:12px;color:#64748b;margin-bottom:10px}
.mg{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px}
.mg button{padding:6px 10px;border-radius:8px;border:1.5px solid #334155;background:#0f172a;color:#94a3b8;font-size:12px;cursor:pointer;white-space:nowrap;transition:.2s}
.mg button.on{background:#6366f1;border-color:#6366f1;color:#fff}
.mg button.used{background:#1e3a5f;border-color:#6366f1}
.mg button small{display:block;font-size:9px;color:#64748b}

.fl{display:flex;gap:6px;margin:8px 0}
.fl input{flex:1;padding:10px;border:1.5px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none}
.fl input:focus{border-color:#6366f1}

.btn{display:block;width:100%;padding:12px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;text-align:center}
.btn.p{background:#6366f1;color:#fff}
.btn.p:active{opacity:.8}
.btn.p:disabled{background:#334155;cursor:not-allowed}
.btn.s{background:#1e293b;color:#94a3b8;border:1px solid #334155}

/* 图片生成 */
#imgResult{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
#imgResult>div{position:relative}
#imgResult img{width:100%;border-radius:8px;display:block}
#imgResult .il{font-size:11px;color:#64748b;text-align:center;margin-top:2px}
#imgResult .dl{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);color:#fff;border-radius:4px;padding:2px 6px;font-size:11px;cursor:pointer}

.loading{text-align:center;padding:20px;color:#64748b;font-size:13px}
.loading .sp{display:inline-block;width:16px;height:16px;border:2px solid #334155;border-top-color:#6366f1;border-radius:50%;animation:sp .6s linear infinite;margin-right:6px;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}

.empty{text-align:center;padding:30px;color:#64748b;font-size:13px}.em{font-size:32px;margin-bottom:6px}
.nv{position:fixed;bottom:0;left:50%;transform:translateX(-50%);max-width:560px;width:100%;background:#1e293b;display:flex;border-top:1px solid #334155;padding:4px 0 14px;z-index:20}
.nv>div{flex:1;text-align:center;padding:4px;cursor:pointer;font-size:10px;color:#64748b}
.nv>div.on{color:#818cf8}
.nv em{font-size:18px;display:block;font-style:normal}

.tst{position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:#334155;color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;z-index:999;animation:fi .2s;max-width:90%;text-align:center}
@keyframes fi{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

/* Settings面板 */
.stg{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:none;align-items:center;justify-content:center}
.stg.on{display:flex}
.stg-c{background:#1e293b;border-radius:16px;padding:24px;max-width:420px;width:90%;max-height:80vh;overflow-y:auto}
.stg-c h3{font-size:16px;margin-bottom:12px;color:#e2e8f0}
.stg-c .fl{display:flex;gap:6px;margin-bottom:8px}
.stg-c .fl input{flex:1;padding:10px;border:1.5px solid #334155;border-radius:8px;background:#0f172a;color:#e2e8f0;font-size:13px;outline:none}
.stg-c label{font-size:12px;color:#94a3b8;display:block;margin-bottom:4px}
.stg-c .row{display:flex;gap:8px;margin-top:12px}
.stg-c .row button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer}
.stg-c .row button.p{background:#6366f1;color:#fff}
.stg-c .row button.s{background:#334155;color:#94a3b8}
.stg-c .info{font-size:11px;color:#64748b;margin-top:8px;line-height:1.6}

/* Markdown 轻量样式 */
.msg .b h1,.msg .b h2,.msg .b h3{font-size:15px;margin:6px 0 3px}
.msg .b h4,.msg .b h5{font-size:13px;margin:4px 0 2px}
.msg .b ul,.msg .b ol{padding-left:16px;margin:4px 0}
.msg .b li{margin:2px 0}
.msg .b blockquote{border-left:3px solid #6366f1;padding:4px 8px;margin:4px 0;background:#0f172a;border-radius:4px;color:#94a3b8}
.msg .b table{border-collapse:collapse;margin:4px 0;font-size:12px;width:100%}
.msg .b th,.msg .b td{border:1px solid #334155;padding:4px 8px;text-align:left}
.msg .b th{background:#334155}

@media(prefers-color-scheme:light){
  body{background:#f8fafc;color:#1e293b}
  .cd,.tb,.iBar,.nv,.stg-c{background:#fff}
  .tb{border-bottom-color:#e2e8f0}.tb>div{color:#94a3b8}.tb>div.on{color:#6366f1;border-bottom-color:#6366f1}
  .iBar textarea,.fl input,.mg button,.msg .b pre{background:#f1f5f9;border-color:#e2e8f0;color:#1e293b}
  .mg button.on{background:#6366f1;color:#fff}
  .msg.a .b{background:#fff;border-color:#e2e8f0}
  .msg .b code{background:#e2e8f0;color:#1e293b}
  .stg-c{background:#fff}
  .btn.s{background:#f1f5f9;color:#64748b}
}
</style>
</head>
<body>

<div class=hdr>
  <span>🤖 AI Playground</span>
  <span class=st onclick="tS()" style=cursor:pointer>⚙️</span>
</div>

<div class=tb id=tb>
  <div class=on data-p=p1>💬 聊天</div>
  <div data-p=p2>🎨 图片</div>
  <div data-p=p3>💭 模型</div>
</div>

<div class=nv id=nv>
  <div class=on data-p=p1><em>💬</em>聊天</div>
  <div data-p=p2><em>🎨</em>图片</div>
  <div data-p=p3><em>💭</em>模型</div>
</div>

<!-- 聊天 -->
<div id=p1 class="pg on">
<div class=ct id=chatArea>
  <div id=chatBox>
    <div class=empty id=chatEmpty>
      <div class=em>🤖</div>
      <p>选择一个模型，开始对话</p>
      <p style=font-size:11px;margin-top:4px>已加载 <span id=modelName>未选择</span></p>
    </div>
  </div>
  <div class=iBar>
    <textarea id=chatInput rows=1 placeholder="输入消息..." onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sChat()}"></textarea>
    <button id=chatBtn onclick=sChat()>➤</button>
  </div>
</div>
</div>

<!-- 图片生成 -->
<div id=p2 class=pg>
<div class=ct>
<div class=cd>
  <h2>🎨 图片生成</h2>
  <p class=h>输入描述文字，AI为你生成图片</p>
  <div class=mg id=imgModels>
    <button class=on>Qwen/Qwen-Image</button>
    <button>Tongyi-MAI/Z-Image-Turbo</button>
  </div>
  <div class=fl>
    <input id=imgPrompt placeholder="描述你想生成的图片...">
  </div>
  <div class=mg id=imgSize style=margin-bottom:4px>
    <button class=on>1024×1024</button><button>1024×768</button><button>768×1024</button>
  </div>
  <button class="btn p" onclick=sImg() id=imgBtn>🎨 生成图片</button>
  <div id=imgResult></div>
</div>
</div>
</div>

<!-- 模型浏览 -->
<div id=p3 class=pg>
<div class=ct>
<div class=cd>
  <h2>💭 可用模型</h2>
  <p class=h>点击复制模型ID，在设置中更换</p>
  <div id=modelList></div>
</div>
</div>
</div>

<!-- 设置弹窗 -->
<div class=stg id=settings>
  <div class=stg-c>
    <h3>⚙️ 设置</h3>
    <label>API Key</label>
    <div class=fl><input id=apiKeyInput type=password placeholder="输入 SiliconFlow API Key"></div>
    <label>聊天模型 ID</label>
    <div class=fl><input id=chatModelInput placeholder="deepseek-ai/DeepSeek-V4-Flash"></div>
    <div class=info id=apiStatus></div>
    <div class=row>
      <button class=s onclick="hS()">取消</button>
      <button class=p onclick="saveS()">保存</button>
    </div>
  </div>
</div>

<script>
// ====== 默认配置 ======
var DEFAULT_KEY = '';
var API_BASE = 'https://api.siliconflow.cn/v1';
var API_KEY = localStorage.getItem('ai_api_key') || DEFAULT_KEY;
var CHAT_MODEL = localStorage.getItem('ai_chat_model') || 'deepseek-ai/DeepSeek-V4-Flash';
var IMG_MODEL = 'Qwen/Qwen-Image';

var messages = [];
var isGenerating = false;
var allModels = [];

// ====== 工具 ======
function t(msg){var d=document.createElement('div');d.className='tst';d.textContent=msg;document.body.appendChild(d);setTimeout(function(){d.remove()},2500)}
function $(id){return document.getElementById(id)}

// ====== Tab ======
['tb','nv'].forEach(function(id){
  document.getElementById(id).onclick=function(e){
    var t=e.target.closest('div');if(!t||!t.dataset||!t.dataset.p||t.id)return;
    document.querySelectorAll('.pg').forEach(function(d){d.className='pg'});
    document.querySelectorAll('#tb div,#nv div').forEach(function(d){d.className=''});
    t.className='on';
    document.querySelectorAll('#tb div,#nv div').forEach(function(d){if(d.dataset.p===t.dataset.p)d.className='on'});
    document.getElementById(t.dataset.p).className='pg on';
    if(t.dataset.p==='p3')loadModels();
  }
});

// ====== API 调用 ======
async function apiCall(path, body){
  var r=await fetch(API_BASE+path,{
    method:'POST',
    headers:{'Authorization':'Bearer '+API_KEY,'Content-Type':'application/json'},
    body:JSON.stringify(body)
  });
  if(!r.ok){var err=await r.text();try{var j=JSON.parse(err);throw new Error(j.message||j.error||err)}catch(e){throw e}}
  return r;
}

// ====== 聊天 ======
function addMsg(role,content,model){
  var box=$('chatBox'),empty=$('chatEmpty');
  if(empty)empty.style.display='none';
  var d=document.createElement('div');d.className='msg '+(role==='user'?'u':'a');
  d.innerHTML='<div class="av '+(role==='user'?'u':'a')+'">'+(role==='user'?'👤':'🤖')+'</div><div class=b>'+(model?'<div class=tn>'+model+'</div>':'')+(role==='assistant'?renderMD(content):escHTML(content))+'</div>';
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
function escHTML(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>')}
function renderMD(s){
  // 简单markdown渲染
  s=escHTML(s);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/### ([^\n]+)/g,'<h3>$1</h3>');
  s=s.replace(/## ([^\n]+)/g,'<h2>$1</h2>');
  s=s.replace(/# ([^\n]+)/g,'<h1>$1</h1>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/\n- ([^\n]+)/g,'\n<li>$1</li>');
  s=s.replace(/\n\d+\. ([^\n]+)/g,'\n<li>$1</li>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

async function sChat(){
  var input=$('chatInput'),btn=$('chatBtn');
  var text=input.value.trim();
  if(!text||isGenerating)return;
  if(!API_KEY||API_KEY===DEFAULT_KEY){t('⚠️ 请先在设置中填入你的 API Key');return}
  
  input.value='';btn.disabled=true;isGenerating=true;
  addMsg('user',text);
  
  // 流式调用
  var msgs=[{role:'user',content:text}];
  try{
    var r=await apiCall('/chat/completions',{
      model:CHAT_MODEL, messages:msgs, stream:true, max_tokens:2048
    });
    
    var reader=r.body.getReader();var decoder=new TextDecoder();var full='';
    // 先加一条空回复
    addMsg('assistant','▋');
    var box=$('chatBox');var lastMsg=box.lastElementChild;
    
    while(true){
      var {done,value}=await reader.read();
      if(done)break;
      var chunk=decoder.decode(value,{stream:true});
      var lines=chunk.split('\n').filter(l=>l.startsWith('data:')&&!l.includes('[DONE]'));
      for(var line of lines){
        try{
          var d=JSON.parse(line.slice(5));
          var delta=d.choices[0].delta.content||'';
          full+=delta;
          lastMsg.querySelector('.b').innerHTML=renderMD(full)+(full?'':'▋');
          box.scrollTop=box.scrollHeight;
        }catch(e){}
      }
    }
    lastMsg.querySelector('.b').innerHTML=renderMD(full);
  }catch(e){t('❌ 错误: '+e.message);isGenerating=false;btn.disabled=false;return}
  isGenerating=false;btn.disabled=false;
}

// ====== 图片生成 ======
async function sImg(){
  var prompt=$('imgPrompt').value.trim();
  if(!prompt){t('请输入描述');return}
  if(!API_KEY||API_KEY===DEFAULT_KEY){t('⚠️ 请先在设置中填入你的 API Key');return}
  
  var model=document.querySelector('#imgModels .on');var m=model?model.textContent.trim():'Qwen/Qwen-Image';
  var sizeSel=document.querySelector('#imgSize .on');var size=sizeSel?sizeSel.textContent.trim():'1024×1024';
  var btn=$('imgBtn');btn.disabled=true;btn.textContent='⏳ 生成中...';
  $('imgResult').innerHTML='<div class=loading style=grid-column:1/-1><div class=sp></div> 正在生成...</div>';
  
  try{
    var r=await apiCall('/images/generations',{
      model:m, prompt:prompt, image_size:size, batch_size:1
    });
    var d=await r.json();
    var imgs=d.data||[];
    var h='';
    for(var i=0;i<imgs.length;i++){
      var url=imgs[i].url;
      h+='<div><img src="'+url+'" loading=lazy><div class=il>图片 '+(i+1)+'</div><span class=dl onclick="dlImg(\''+url+'\',\'ai_'+Date.now()+'.png\')">⬇</span></div>';
    }
    $('imgResult').innerHTML=h||'<div class=empty>未生成图片</div>';
  }catch(e){$('imgResult').innerHTML='<div class=empty>❌ '+e.message+'</div>'}
  btn.disabled=false;btn.textContent='🎨 生成图片';
}

function dlImg(url,name){
  var a=document.createElement('a');a.href=url;a.download=name;a.click();
}

// ====== 模型列表 ======
async function loadModels(){
  if(allModels.length>0){renderModels();return}
  var list=$('modelList');list.innerHTML='<div class=loading><div class=sp></div> 加载中...</div>';
  try{
    var r=await fetch('https://api.siliconflow.cn/v1/models',{headers:{'Authorization':'Bearer '+API_KEY}});
    var d=await r.json();
    allModels=d.data||[];
    renderModels();
  }catch(e){list.innerHTML='<div class=empty>❌ 加载失败: '+e.message+'</div>'}
}
function renderModels(){
  var list=$('modelList'),h='';
  allModels.sort(function(a,b){return a.id.localeCompare(b.id)});
  for(var i=0;i<allModels.length;i++){
    var m=allModels[i];
    h+='<div class=mg style=margin:2px 0>'+(m.id===CHAT_MODEL?'<button class=on style="margin:2px" onclick="copyID(this,\''+m.id+'\')">'+m.id+' <small>✓ 当前</small></button>':'<button style="margin:2px" onclick="copyID(this,\''+m.id+'\')">'+m.id+'</button>')+'</div>';
  }
  list.innerHTML=h||'<div class=empty>无模型数据</div>';
}
function copyID(el,id){
  navigator.clipboard.writeText(id).then(function(){t('✅ 已复制: '+id)}).catch(function(){t('点击: '+id)});
}

// ====== 设置 ======
function tS(){$('settings').classList.add('on');$('apiKeyInput').value=API_KEY==DEFAULT_KEY?'':API_KEY;$('chatModelInput').value=CHAT_MODEL;$('apiStatus').textContent=API_KEY?'🔑 已配置 API Key':'⚠️ 需要 SiliconFlow API Key，访问 platform.siliconflow.cn 注册免费获取'}
function hS(){$('settings').classList.remove('on')}
function saveS(){
  var k=$('apiKeyInput').value.trim();var m=$('chatModelInput').value.trim();
  if(!m){t('请输入模型ID');return}
  if(k){localStorage.setItem('ai_api_key',k);API_KEY=k}else{API_KEY=DEFAULT_KEY}
  localStorage.setItem('ai_chat_model',m);CHAT_MODEL=m;
  $('modelName').textContent=m;
  hS();t('✅ 已保存');
  messages=[];
}

// ====== 初始化 ======
$('modelName').textContent=CHAT_MODEL;
if(API_KEY===DEFAULT_KEY){setTimeout(function(){t('💡 点击右上角⚙️配置你的 SiliconFlow API Key');$('settings').classList.add('on')},500)}

if('serviceWorker'in navigator)navigator.serviceWorker.register('web/sw.js').catch(function(){});
</script>
</body>
</html>

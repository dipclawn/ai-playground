<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="description" content="🤖 AI Playground - 多模型AI工具箱。支持聊天、图片生成、模型浏览，基于SiliconFlow API。纯前端，保护隐私。">
<meta name="keywords" content="AI,人工智能,大模型,聊天,SiliconFlow,免费AI工具">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AI Playground">
<title>🤖 AI Playground - 多模型AI工具箱</title>
<link rel="icon" href="web/icon-192.png">
<link rel="apple-touch-icon" href="web/icon-192.png">
<link rel="manifest" href="web/manifest.json">
<!-- Semi Design CSS (仅用样式) -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@douyinfe/semi-ui@2.71.0/dist/css/semi.min.css">
<style>
:root{--semi-color-primary:#6366f1;--semi-color-primary-hover:#818cf8;--semi-color-primary-active:#4f46e5}
body{background:var(--semi-color-bg-0);margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;padding-bottom:70px;min-height:100vh;max-width:820px;margin:0 auto}
.app-header{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:50px 24px 14px;position:sticky;top:0;z-index:100}
.app-header h1{font-size:20px;font-weight:600;margin:0;display:flex;align-items:center;gap:8px}
.app-header .sub{font-size:12px;opacity:.8;margin-top:2px}
.app-header .hdr-right{display:flex;gap:6px;align-items:center}

/* Tab Bar */
.tab-bar{display:flex;background:var(--semi-color-bg-1);border-bottom:1px solid var(--semi-color-border);position:sticky;top:86px;z-index:99}
.tab-item{padding:10px 18px;cursor:pointer;font-size:13px;font-weight:500;color:var(--semi-color-text-1);border-bottom:2px solid transparent;transition:.15s;user-select:none}
.tab-item.active{color:var(--semi-color-primary);border-bottom-color:var(--semi-color-primary)}

/* 聊天 */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 180px);min-height:380px}
.chat-box{flex:1;overflow-y:auto;padding:12px 16px;scroll-behavior:smooth}
.msg{display:flex;gap:10px;margin:10px 0;animation:fadeIn .2s}
.msg.user{flex-direction:row-reverse}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.msg .av{width:32px;height:32px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.msg .av.ai{background:var(--semi-color-primary-light-default)}
.msg .av.user{background:rgba(14,165,233,.12)}
.msg .b{max-width:80%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.7;overflow-wrap:break-word;white-space:pre-wrap}
.msg.user .b{background:var(--semi-color-primary);color:#fff;border-radius:12px 4px 12px 12px}
.msg.ai .b{background:var(--semi-color-bg-1);border:1px solid var(--semi-color-border);border-radius:4px 12px 12px 12px}
.msg .b .model-tag{font-size:10px;color:var(--semi-color-text-2);margin-bottom:4px}
.msg .b pre{background:var(--semi-color-bg-0);padding:8px;border-radius:6px;overflow-x:auto;font-size:12px;margin:4px 0}
.msg .b code{background:var(--semi-color-bg-0);padding:1px 5px;border-radius:4px;font-size:12px;color:var(--semi-color-danger)}
.msg .b h1,.msg .b h2,.msg .b h3{font-size:15px;margin:6px 0 3px}
.msg .b ul,.msg .b ol{padding-left:16px;margin:4px 0}
.msg .b blockquote{border-left:3px solid var(--semi-color-primary);padding:4px 10px;margin:4px 0;background:var(--semi-color-bg-0);border-radius:4px;color:var(--semi-color-text-2)}
.msg .b table{border-collapse:collapse;margin:4px 0;font-size:12px;width:100%}
.msg .b th,.msg .b td{border:1px solid var(--semi-color-border);padding:4px 8px;text-align:left}

.input-bar{display:flex;gap:8px;padding:10px 16px;background:var(--semi-color-bg-1);border-top:1px solid var(--semi-color-border);align-items:flex-end}
.input-bar textarea{flex:1;padding:10px 14px;border-radius:10px;border:1px solid var(--semi-color-border);background:var(--semi-color-bg-0);font-size:14px;line-height:1.4;outline:none;resize:none;min-height:40px;max-height:120px;font-family:inherit;color:var(--semi-color-text-0)}
.input-bar textarea:focus{border-color:var(--semi-color-primary)}
.input-bar .send-btn{height:40px;width:40px;border-radius:10px;border:none;background:var(--semi-color-primary);color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* Content */
.tab-content{padding:16px}
.card{background:var(--semi-color-bg-1);border-radius:12px;padding:20px;margin-bottom:12px;border:1px solid var(--semi-color-border)}
.card h3{font-size:15px;font-weight:600;margin:0 0 4px;display:flex;align-items:center;gap:6px}
.card .desc{font-size:12px;color:var(--semi-color-text-2);margin-bottom:14px}

/* Grid tags */
.tag-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.tag-pill{padding:5px 12px;border-radius:16px;border:1px solid var(--semi-color-border);background:var(--semi-color-bg-0);color:var(--semi-color-text-1);font-size:12px;cursor:pointer;transition:.15s;user-select:none}
.tag-pill.active{background:var(--semi-color-primary);border-color:var(--semi-color-primary);color:#fff}

/* 图片网格 */
.img-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-top:10px}
.img-item{position:relative;border-radius:10px;overflow:hidden;background:var(--semi-color-bg-0)}
.img-item img{width:100%;display:block}
.img-item .il{font-size:11px;color:var(--semi-color-text-2);text-align:center;padding:4px}
.img-item .dl{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.5);color:#fff;border:none;border-radius:6px;padding:2px 8px;cursor:pointer;font-size:11px}

/* Button */
.btn{display:block;width:100%;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;text-align:center}
.btn.primary{background:var(--semi-color-primary);color:#fff}
.btn.danger{background:var(--semi-color-danger);color:#fff}
.btn.secondary{background:var(--semi-color-bg-0);color:var(--semi-color-text-1);border:1px solid var(--semi-color-border)}

input.inp{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--semi-color-border);background:var(--semi-color-bg-0);font-size:13px;outline:none;font-family:inherit;color:var(--semi-color-text-0);box-sizing:border-box}
input.inp:focus{border-color:var(--semi-color-primary)}

/* Modal overlay */
.m-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center}
.m-overlay.show{display:flex}
.m-box{background:var(--semi-color-bg-1);border-radius:16px;padding:24px;width:90%;max-width:440px;max-height:80vh;overflow-y:auto}
.m-box h3{font-size:16px;margin:0 0 16px}
.m-section{margin-bottom:16px}
.m-section label{font-size:13px;font-weight:500;display:block;margin-bottom:4px;color:var(--semi-color-text-0)}
.m-section .hint{font-size:11px;color:var(--semi-color-text-2);margin-top:4px;line-height:1.5}
.m-btns{display:flex;gap:8px;margin-top:16px}
.m-btns button{flex:1;padding:10px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer}

/* Toast */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--semi-color-bg-1);color:var(--semi-color-text-0);padding:10px 20px;border-radius:10px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.15);animation:tIn .2s;max-width:90%;border:1px solid var(--semi-color-border)}
@keyframes tIn{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast.warn{border-left:3px solid var(--semi-color-warning)}
.toast.err{border-left:3px solid var(--semi-color-danger)}
.toast.ok{border-left:3px solid var(--semi-color-success)}

/* Spinner */
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--semi-color-border);border-top-color:var(--semi-color-primary);border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes sp{to{transform:rotate(360deg)}}

/* Empty */
.empty-s{text-align:center;padding:40px 16px;color:var(--semi-color-text-2)}
.empty-s .emoji{font-size:48px;margin-bottom:8px}

/* Cursor blink */
.cursor-b{display:inline-block;width:8px;height:16px;background:var(--semi-color-primary);animation:bl .8s step-end infinite;vertical-align:middle;margin-left:2px;border-radius:2px}
@keyframes bl{50%{opacity:0}}

/* 历史侧栏 */
.layout{display:flex;min-height:calc(100vh - 138px)}
.sidebar{width:220px;background:var(--semi-color-bg-1);border-right:1px solid var(--semi-color-border);padding:10px;flex-shrink:0;overflow-y:auto}
.sidebar h4{font-size:12px;font-weight:600;color:var(--semi-color-text-1);margin:0 0 8px;display:flex;justify-content:space-between;align-items:center}
.sidebar h4 button{background:none;border:none;font-size:16px;cursor:pointer;padding:2px 6px;color:var(--semi-color-primary)}
.h-item{padding:7px 10px;border-radius:8px;cursor:pointer;font-size:12px;margin:2px 0;transition:.15s;overflow:hidden}
.h-item:hover{background:var(--semi-color-fill-0)}
.h-item.active{background:var(--semi-color-primary-light-default);color:var(--semi-color-primary)}

@media(max-width:640px){.sidebar{display:none!important}.msg .b{max-width:90%}}
</style>
</head>
<body>

<div class="app-header">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h1>🤖 AI Playground</h1>
    <div class="hdr-right">
      <span style="background:rgba(255,255,255,.15);padding:4px 10px;border-radius:14px;font-size:11px;cursor:pointer" onclick="openSet()">⚙️ 设置</span>
    </div>
  </div>
  <div class="sub">多模型对话 · 图片生成 · 基于 SiliconFlow</div>
</div>

<!-- Tab Bar -->
<div class="tab-bar">
  <div class="tab-item active" data-tab="chat" onclick="switchT('chat')">💬 对话</div>
  <div class="tab-item" data-tab="image" onclick="switchT('image')">🎨 图片生成</div>
  <div class="tab-item" data-tab="models" onclick="switchT('models')">💭 模型</div>
</div>

<div class="layout">
  <!-- 侧栏 -->
  <div class="sidebar" id="sidebar">
    <h4><span>💬 对话历史</span><button onclick="newConv()">+</button></h4>
    <div id="historyList"><div style="font-size:11px;color:var(--semi-color-text-3);padding:8px;text-align:center">暂无对话</div></div>
  </div>
  
  <!-- 主区域 -->
  <div style="flex:1;display:flex;flex-direction:column" id="mainArea">
    <!-- 由JS注入 -->
  </div>
</div>

<!-- 设置弹窗 -->
<div class="m-overlay" id="setModal">
  <div class="m-box">
    <h3>⚙️ 设置</h3>
    <div class="m-section">
      <label>SiliconFlow API Key</label>
      <input id="setKey" class="inp" type="password" placeholder="输入你的 API Key">
      <div class="hint" id="setStatus">需要 Key，访问 platform.siliconflow.cn 注册</div>
    </div>
    <div class="m-section">
      <label>聊天模型 ID</label>
      <input id="setModel" class="inp" placeholder="deepseek-ai/DeepSeek-V4-Flash">
      <div class="hint">填写任意 SiliconFlow 支持的模型 ID</div>
    </div>
    <div class="m-section">
      <button class="btn danger" onclick="if(confirm('确定清空所有对话？')){S.convs=[];S.cur=null;save();render();closeSet();toast('已清空','ok')}">🗑️ 清空所有对话</button>
    </div>
    <div class="m-btns">
      <button class="btn secondary" onclick="closeSet()">取消</button>
      <button class="btn primary" onclick="saveSet()">保存</button>
    </div>
  </div>
</div>

<script>
// ====== 全局状态 ======
var S = {
  key: localStorage.getItem('ai_api_key') || '',
  model: localStorage.getItem('ai_chat_model') || 'deepseek-ai/DeepSeek-V4-Flash',
  convs: JSON.parse(localStorage.getItem('ai_conv') || '[]'),
  cur: null,
  gen: false,
  tab: 'chat',
  models: [],
  imgModel: 'Qwen/Qwen-Image',
  imgSize: '1024x1024'
};
var API = 'https://api.siliconflow.cn/v1';

// ====== 工具 ======
function save(){localStorage.setItem('ai_api_key',S.key);localStorage.setItem('ai_chat_model',S.model);localStorage.setItem('ai_conv',JSON.stringify(S.convs))}
function id(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6)}
function $(id){return document.getElementById(id)}

function toast(msg,t){
  var d=document.createElement('div');d.className='toast'+(t==='warn'?' warn':t==='err'?' err':t==='ok'?' ok':'');
  d.textContent=msg;document.body.appendChild(d);
  setTimeout(function(){d.remove()},2500);
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function md(s){
  s=esc(s);
  s=s.replace(/```(\w*)\n([\s\S]*?)```/g,'<pre><code>$2</code></pre>');
  s=s.replace(/`([^`]+)`/g,'<code>$1</code>');
  s=s.replace(/### ([^\n]+)/g,'<h3>$1</h3>');
  s=s.replace(/## ([^\n]+)/g,'<h2>$1</h2>');
  s=s.replace(/# ([^\n]+)/g,'<h1>$1</h1>');
  s=s.replace(/\*\*([^*]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/\*([^*]+)\*/g,'<em>$1</em>');
  s=s.replace(/\n- ([^\n]+)/g,'\n<li>$1</li>');
  s=s.replace(/\n/g,'<br>');
  return s;
}

// ====== 对话 ======
function getC(){
  if(S.cur)return S.cur;
  var c={id:id(),model:S.model,messages:[],title:'新对话',t:Date.now()};
  S.cur=c;S.convs.unshift(c);save();
  return c;
}

function newConv(){S.cur=null;render();sidebar();}

function switchC(id){
  var c=S.convs.find(function(x){return x.id===id});
  if(!c)return;
  S.cur=c;S.model=c.model;save();
  if(S.tab==='chat')renderChat();sidebar();
}

function delC(id,e){
  e.stopPropagation();
  S.convs=S.convs.filter(function(x){return x.id!==id});
  if(S.cur&&S.cur.id===id)S.cur=S.convs[0]||null;
  save();sidebar();if(S.tab==='chat')renderChat();
}

function addMsg(r,content,model){
  var c=getC();
  c.messages.push({role:r,content:content,model:model,t:Date.now()});
  if(c.title==='新对话'&&r==='user')c.title=content.slice(0,30)+(content.length>30?'...':'');
  save();if(S.tab==='chat')renderChat();sidebar();
}

// ====== 聊天 ======
async function sendChat(){
  if(S.gen)return;
  if(!S.key){toast('请先设置 API Key','warn');openSet();return}
  var inp=$('chatInput');
  if(!inp)return;
  var t=inp.value.trim();
  if(!t)return;
  inp.value='';S.gen=true;
  addMsg('user',t);
  
  var c=getC();
  var msgs=c.messages.map(function(m){return {role:m.role,content:m.content}});
  
  var full='';
  try{
    var r=await fetch(API+'/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+S.key,'Content-Type':'application/json'},
      body:JSON.stringify({model:S.model,messages:msgs,stream:true,max_tokens:4096,temperature:0.7})
    });
    if(!r.ok){var j=await r.text();try{j=JSON.parse(j);j=j.message||j.error||j}catch(eee){}throw new Error(j)}
    
    c.messages.push({role:'assistant',content:'',model:S.model,t:Date.now()});
    renderChat(true);
    var box=$('chatBox'),lastMsg=box?box.lastElementChild:null;
    
    // 流式降级: 不支持ReadableStream时走非流式
    if(r.body&&r.body.getReader){
      var reader=r.body.getReader(),dec=new TextDecoder();
      var tick=0;
      while(true){
        var {done,value}=await reader.read();
        if(done)break;
        var chunk=dec.decode(value,{stream:true});
        chunk.split('\n').filter(function(l){return l.startsWith('data:')&&!l.includes('[DONE]')}).forEach(function(line){
          try{
            var d=JSON.parse(line.slice(5));
            var delta=d.choices[0].delta.content||'';
            full+=delta;
            c.messages[c.messages.length-1].content=full;
            var b=lastMsg?lastMsg.querySelector('.b'):null;
            if(b&&box){b.innerHTML=md(full)+'<span class="cursor-b"></span>';box.scrollTop=box.scrollHeight}
            // 每5次tick存一次，防止刷新丢失
            tick++;if(tick%5===0)save();
          }catch(e){}
        });
      }
    }else{
      // 降级: 非流式（兼容微信等低版本浏览器）
      var d=await r.json();
      full=d.choices[0].message.content||'';
      c.messages[c.messages.length-1].content=full;
      save();
    }
    
    if(lastMsg){var b2=lastMsg.querySelector('.b');if(b2)b2.innerHTML=md(full)}
    save();
  }catch(e){
    toast('❌ '+e.message,'err');
    if(S.cur&&S.cur.messages)S.cur.messages.pop();
  }
  S.gen=false;
}

// ====== 继续中断消息 ======
async function continueMsg(idx){
  if(S.gen||!S.cur)return;
  if(!S.key){toast('请先设置 API Key','warn');openSet();return}
  var c=S.cur;
  var target=c.messages[idx];
  if(!target||target.role!=='assistant')return;
  
  S.gen=true;
  var prefix=target.content||'';
  target.broken=false; // 移除中断标记
  
  // 用历史消息（不含当前中断这条或包含它但作为prefix）
  var msgs=c.messages.slice(0,idx).map(function(m){return {role:m.role,content:m.content}});
  // 把已有内容作为prefix传给模型
  msgs.push({role:'assistant',content:prefix});
  
  var full=prefix;
  try{
    var r=await fetch(API+'/chat/completions',{
      method:'POST',
      headers:{'Authorization':'Bearer '+S.key,'Content-Type':'application/json'},
      body:JSON.stringify({model:S.model||c.model,messages:msgs,stream:true,max_tokens:4096,temperature:0.7})
    });
    if(!r.ok){var j=await r.text();try{j=JSON.parse(j);j=j.message||j.error||j}catch(eee){}throw new Error(j)}
    
    renderChat(true);
    var box=$('chatBox'),lastMsg=box?box.lastElementChild:null;
    
    if(r.body&&r.body.getReader){
      var reader=r.body.getReader(),dec=new TextDecoder();
      var tick=0;
      while(true){
        var {done,value}=await reader.read();
        if(done)break;
        var chunk=dec.decode(value,{stream:true});
        chunk.split('\n').filter(function(l){return l.startsWith('data:')&&!l.includes('[DONE]')}).forEach(function(line){
          try{
            var d=JSON.parse(line.slice(5));
            var delta=d.choices[0].delta.content||'';
            full+=delta;
            c.messages[idx].content=full;
            var b=lastMsg?lastMsg.querySelector('.b'):null;
            if(b&&box){b.innerHTML=md(full);box.scrollTop=box.scrollHeight}
            tick++;if(tick%5===0)save();
          }catch(e){}
        });
      }
    }else{
      var d=await r.json();
      full+=d.choices[0].message.content||'';
      c.messages[idx].content=full;
      save();
    }
    
    if(lastMsg){var b2=lastMsg.querySelector('.b');if(b2)b2.innerHTML=md(full)}
    save();
    toast('✅ 已续写完成','ok');
  }catch(e){
    toast('❌ '+e.message,'err');
    target.broken=true; // 恢复标记
  }
  S.gen=false;
}

// ====== 图片生成 ======
async function genImg(){
  if(!S.key){toast('请先设置 API Key','warn');openSet();return}
  var inp=$('imgPrompt');if(!inp)return;
  var p=inp.value.trim();if(!p){toast('请输入图片描述','warn');return}
  
  inp.disabled=true;$('imgBtn').textContent='⏳ 生成中...';
  var re=$('imgResult');re.innerHTML='<div style="text-align:center;padding:20px;color:var(--semi-color-text-2)"><div class="spinner"></div> 正在生成...</div>';
  
  try{
    var r=await fetch(API+'/images/generations',{
      method:'POST',
      headers:{'Authorization':'Bearer '+S.key,'Content-Type':'application/json'},
      body:JSON.stringify({model:S.imgModel,prompt:p,image_size:S.imgSize,batch_size:2})
    });
    if(!r.ok){var j=await r.text();try{j=JSON.parse(j);j=j.message||j.error||j}catch(ee){}throw new Error(j)}
    var d=await r.json();
    var imgs=d.data||[];
    var h='<div class="img-grid">';
    imgs.forEach(function(img,i){
      h+='<div class="img-item"><img src="'+img.url+'" loading=lazy><div class="il">图片'+(i+1)+'</div><button class="dl" onclick="dlImg(\''+img.url+'\',\'ai_'+Date.now()+'_'+i+'.png\')">⬇</button></div>';
    });
    h+='</div>';
    re.innerHTML=h;
    toast('✅ 生成完成','ok');
  }catch(e){re.innerHTML='<div style="text-align:center;padding:20px;color:var(--semi-color-danger)">❌ '+e.message+'</div>'}
  inp.disabled=false;$('imgBtn').textContent='🎨 生成图片';
}
function dlImg(u,n){var a=document.createElement('a');a.href=u;a.download=n;a.click()}

// ====== 模型 ======
async function loadModels(){
  if(S.models.length>0){renderModels();return}
  try{
    var r=await fetch('https://api.siliconflow.cn/v1/models',{headers:{'Authorization':'Bearer '+S.key}});
    if(!r.ok)throw new Error('请求失败');
    var d=await r.json();
    S.models=d.data||[];
    renderModels();
  }catch(e){var el=$('modelList');if(el)el.innerHTML='<div style="text-align:center;padding:20px;color:var(--semi-color-text-2)">加载失败，检查 API Key</div>'}
}
function renderModels(){
  var el=$('modelList');if(!el)return;
  S.models.sort(function(a,b){return a.id.localeCompare(b.id)});
  el.innerHTML='<div class="tag-grid">'+S.models.map(function(m){
    return '<span class="tag-pill'+(m.id===S.model?' active':'')+'" onclick="selectModel(\''+m.id.replace(/'/g,"\\'")+'\')">'+m.id+'</span>';
  }).join('')+'</div>';
}
function selectModel(id){
  S.model=id;save();renderModels();toast('✅ 已切换: '+id.split('/').pop(),'ok');
}

// ====== 渲染 ======
function switchT(t){
  S.tab=t;
  document.querySelectorAll('.tab-item').forEach(function(el){el.classList.remove('active')});
  var found=document.querySelector('.tab-item[data-tab="'+t+'"]');
  if(found)found.classList.add('active');
  render();
}

function render(){
  var area=$('mainArea');
  if(!area)return;
  if(S.tab==='chat')renderChat();
  else if(S.tab==='image')renderImg();
  else if(S.tab==='models'){renderModelsTab();setTimeout(loadModels,100)}
}

function renderChat(scroll){
  var c=S.cur;
  var h=c&&c.messages.length>0?'':('<div class="empty-s"><div class="emoji">🤖</div><p style="font-size:15px;margin-bottom:2px">开始对话</p><p style="font-size:12px">当前: '+S.model.split('/').pop()+'</p></div>');
  
  if(c&&c.messages.length>0){
    h=c.messages.map(function(m,mi){
      var role=m.role==='user'?'user':'ai';
      return '<div class="msg '+role+'"><div class="av '+(role==='user'?'user':'ai')+'">'+(role==='user'?'👤':'🤖')+'</div><div class="b">'+
        (m.model?'<div class="model-tag">'+m.model.split('/').pop()+'</div>':'')+
        (role==='ai'?md(m.content||'')+(m.broken?' <span style="font-size:10px;color:var(--semi-color-warning)">⚠️ 已中断</span> <span style="font-size:11px;color:var(--semi-color-primary);cursor:pointer;text-decoration:underline" onclick="continueMsg('+mi+')">▶️ 继续</span>':''):esc(m.content).replace(/\n/g,'<br>'))+'</div></div>';
    }).join('');
  }
  
  area = $('mainArea');
  area.innerHTML='<div class="chat-wrap"><div class="chat-box" id="chatBox">'+h+'</div>'+
    '<div class="input-bar"><textarea id="chatInput" rows="1" placeholder="输入消息，Enter发送" onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();sendChat()}"></textarea>'+
    '<button class="send-btn" onclick="sendChat()">➤</button></div></div>';
  
  var box=$('chatBox');
  if(box&&scroll)box.scrollTop=box.scrollHeight;
}

function renderImg(){
  $('mainArea').innerHTML='<div class="tab-content"><div class="card">'+
    '<h3>🎨 AI 图片生成</h3><div class="desc">输入描述文字，AI为你生成图片</div>'+
    '<div style="margin-bottom:10px"><label style="font-size:12px;color:var(--semi-color-text-2);display:block;margin-bottom:4px">模型</label><div class="tag-grid">'+
      '<span class="tag-pill'+(S.imgModel==='Qwen/Qwen-Image'?' active':'')+'" onclick="S.imgModel=\'Qwen/Qwen-Image\';renderImg()">Qwen-Image</span>'+
      '<span class="tag-pill'+(S.imgModel==='Tongyi-MAI/Z-Image-Turbo'?' active':'')+'" onclick="S.imgModel=\'Tongyi-MAI/Z-Image-Turbo\';renderImg()">Z-Image-Turbo</span>'+
    '</div></div>'+
    '<div style="margin-bottom:10px"><label style="font-size:12px;color:var(--semi-color-text-2);display:block;margin-bottom:4px">尺寸</label><div class="tag-grid">'+
      ['1024x1024','1024x768','768x1024'].map(function(s){return '<span class="tag-pill'+(S.imgSize===s?' active':'')+'" onclick="S.imgSize=\''+s+'\';renderImg()">'+s.replace('x','×')+'</span>'}).join('')+
    '</div></div>'+
    '<input id="imgPrompt" class="inp" placeholder="描述你想生成的图片..." style="margin-bottom:10px">'+
    '<button id="imgBtn" class="btn primary" onclick="genImg()">🎨 生成图片</button>'+
    '<div id="imgResult" style="margin-top:10px"></div>'+
  '</div></div>';
}

function renderModelsTab(){
  $('mainArea').innerHTML='<div class="tab-content"><div class="card">'+
    '<h3>💭 可用模型</h3><div class="desc">点击选择对话使用的模型</div>'+
    '<div id="modelList"><div style="text-align:center;padding:20px;color:var(--semi-color-text-2)"><div class="spinner"></div> 加载中...</div></div>'+
  '</div></div>';
}

function sidebar(){
  var el=$('historyList');if(!el)return;
  if(S.convs.length===0){
    el.innerHTML='<div style="font-size:11px;color:var(--semi-color-text-3);padding:8px;text-align:center">暂无对话</div>';
    return;
  }
  el.innerHTML=S.convs.map(function(c){
    return '<div class="h-item'+(S.cur&&S.cur.id===c.id?' active':'')+'" onclick="switchC(\''+c.id+'\')">'+
      '<div style="display:flex;justify-content:space-between;align-items:center">'+
        '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">💬 '+c.title+'</span>'+
        '<span onclick="delC(\''+c.id+'\',event)" style="flex-shrink:0;font-size:12px;padding:0 4px;cursor:pointer;color:var(--semi-color-text-3)">×</span>'+
      '</div></div>';
  }).join('');
}

// ====== 设置 ======
function openSet(){
  $('setModal').classList.add('show');
  $('setKey').value=S.key;
  $('setModel').value=S.model;
  $('setStatus').textContent=S.key?'✅ 已配置':'⚠️ 需要 Key，访问 platform.siliconflow.cn 注册';
}
function closeSet(){$('setModal').classList.remove('show')}
function saveSet(){
  var k=$('setKey').value.trim();
  var m=$('setModel').value.trim();
  if(!m){toast('请输入模型ID','warn');return}
  if(k){S.key=k;save()}
  if(m){S.model=m;save()}
  closeSet();toast('✅ 已保存','ok');
}

// ====== 启动 ======
function init(){
  if(S.convs.length>0){
    S.cur=S.convs[0];
    // 标记未完成的消息
    S.convs.forEach(function(c){
      var msgs=c.messages;
      for(var i=0;i<msgs.length;i++){
        var m=msgs[i];
        // 上一条是user、这条是assistant、内容空或结尾为▋ -> 可能是中断的
        if(m.role==='assistant'&&i>0&&msgs[i-1].role==='user'&&(!m.content||m.content.endsWith('▋')||m.content.trim()==='')){
          m.broken=true;
        }
      }
    });
  }
  render();sidebar();
  if(!S.key)setTimeout(function(){toast('⚙️ 请设置 API Key','warn');openSet()},600);
  if('serviceWorker'in navigator)navigator.serviceWorker.register('web/sw.js').catch(function(){});
}
init();
</script>
</body>
</html>
